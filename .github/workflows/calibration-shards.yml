name: Calibration shards

on:
  workflow_dispatch:
    inputs:
      shards:
        description: "Number of shards requested; must match shard_list length for normal runs"
        required: true
        default: "1"
      shard_list:
        description: "JSON array of shard indexes to run, e.g. [0,1,2,3,4]"
        required: true
        default: "[0]"
      decks_per_shard:
        description: "Decks evaluated by each shard"
        required: true
        default: "5"
      matches:
        description: "Forge matches per deck"
        required: true
        default: "100"
      attempt_cap:
        description: "Elite mode generation attempts per shard"
        required: true
        default: "500"
      sampling_mode:
        description: "elite or score-bands"
        required: true
        default: "score-bands"
      candidate_pool_size:
        description: "Score-band mode candidate pool size per shard"
        required: true
        default: "100"
      band_count:
        description: "Score-band mode rank bands per shard"
        required: true
        default: "5"
      skip_validation:
        description: "Skip ruff/format/mypy validation for verified shard reruns"
        required: true
        default: "false"
      forge_calibrator:
        description: "Optional empirical Forge calibrator JSON path for score-band selection"
        required: false
        default: ""
      forge_outcome_model:
        description: "Optional learned Forge-outcome model JSON path for score-band selection"
        required: false
        default: ""
      rerank_shortlist_size:
        description: "Top model-scored candidates to rerank with lightweight Forge sims"
        required: true
        default: "0"
      rerank_matches:
        description: "Lightweight Forge matches per shortlisted rerank candidate"
        required: true
        default: "0"
      rerank_prior_weight:
        description: "Equivalent prior match count assigned to model score during reranking"
        required: true
        default: "20"
      forge_installer_url:
        description: "Forge desktop installer .tar.bz2 URL; must match Forge report metadata"
        required: true
        default: "https://github.com/Card-Forge/forge/releases/download/daily-snapshots/forge-installer-2.0.13-SNAPSHOT-06.11.tar.bz2"
      forge_ai_profile:
        description: "Forge AI profile label to embed in deck-test reports"
        required: true
        default: "forge-daily-snapshot"
      forge_build_id:
        description: "Forge build ID to embed in deck-test reports"
        required: true
        default: "2.0.13-SNAPSHOT-06.11-2026-06-11T19:12:03Z"
      forge_cache_key:
        description: "Cache key for the Forge runtime install; change when installer URL changes"
        required: true
        default: "forge-daily-snapshot-2.0.13-SNAPSHOT-06.11-20260611T191203Z-temurin17-v1"

concurrency:
  group: calibration-shards-${{ github.ref }}
  cancel-in-progress: false

jobs:
  shard:
    name: Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        shard: ${{ fromJSON(inputs.shard_list) }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: deckbuilder
          POSTGRES_PASSWORD: deckbuilder
          POSTGRES_DB: deckbuilder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deckbuilder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DECKBUILDER_DATABASE_URL: postgresql+psycopg://deckbuilder:deckbuilder@localhost:5432/deckbuilder
      DECKBUILDER_FORGE_ROOT: ${{ github.workspace }}/.local/forge
      DECKBUILDER_FORGE_DECKS_DIR: /home/runner/.forge/decks/commander
      DECKBUILDER_FORGE_BUNDLED_DECK_DIR: ${{ github.workspace }}/.local/forge/res/adventure/Realm of Legends/decks/legends
      DECKBUILDER_FORGE_AI_PROFILE: ${{ inputs.forge_ai_profile }}
      DECKBUILDER_FORGE_BUILD_ID: ${{ inputs.forge_build_id }}
      FORGE_INSTALLER_URL: ${{ inputs.forge_installer_url }}
      DECKBUILDER_LLM_DISABLED: "true"
      JAVA_HOME: ${{ github.workspace }}/.local/java/jdk-17

    steps:
      - name: Skip inactive shard
        if: ${{ matrix.shard >= fromJSON(inputs.shards) }}
        run: echo "Shard ${{ matrix.shard }} is outside requested shard count ${{ inputs.shards }}."

      - name: Checkout
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        uses: actions/checkout@v4

      - name: Install OS packages
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y bzip2 curl xauth xvfb

      - name: Install uv
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.2"
          enable-cache: true

      - name: Cache Scryfall bulk data
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        uses: actions/cache@v4
        with:
          path: data/raw/scryfall_oracle_cards.json
          key: scryfall-oracle-cards-v1

      - name: Cache Java and Forge
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        uses: actions/cache@v4
        with:
          path: |
            .local/java
            .local/forge
          key: ${{ inputs.forge_cache_key }}

      - name: Install Python dependencies
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        run: uv sync --frozen

      - name: Install Java and Forge
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        run: |
          mkdir -p .local/java .local/forge "$DECKBUILDER_FORGE_DECKS_DIR" .cache/deckbuilder
          if [ ! -x "$JAVA_HOME/bin/java" ]; then
            curl -L --fail --retry 3 \
              "https://api.adoptium.net/v3/binary/latest/17/ga/linux/x64/jre/hotspot/normal/eclipse" \
              -o .cache/deckbuilder/temurin17-jre.tar.gz
            rm -rf "$JAVA_HOME"
            mkdir -p "$JAVA_HOME"
            tar -xzf .cache/deckbuilder/temurin17-jre.tar.gz -C "$JAVA_HOME" --strip-components=1
          fi
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"
          if [ ! -x "$DECKBUILDER_FORGE_ROOT/forge.sh" ]; then
            curl -L --fail --retry 3 \
              "$FORGE_INSTALLER_URL" \
              -o .cache/deckbuilder/forge-installer.tar.bz2
            rm -rf "$DECKBUILDER_FORGE_ROOT"
            mkdir -p "$DECKBUILDER_FORGE_ROOT"
            tar -xjf .cache/deckbuilder/forge-installer.tar.bz2 -C "$DECKBUILDER_FORGE_ROOT"
          fi
          cp "$DECKBUILDER_FORGE_BUNDLED_DECK_DIR/alela.dck" "$DECKBUILDER_FORGE_DECKS_DIR/"
          cp "$DECKBUILDER_FORGE_BUNDLED_DECK_DIR/atraxa.dck" "$DECKBUILDER_FORGE_DECKS_DIR/"
          java -version

      - name: Validate code
        if: ${{ matrix.shard < fromJSON(inputs.shards) && inputs.skip_validation != 'true' }}
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src

      - name: Prepare database and surrogate
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        run: |
          uv run deckbuilder db init
          uv run python - <<'PY'
          from pathlib import Path
          from deckbuilder.ingest.scryfall import (
              download_oracle_cards,
              load_oracle_cards,
              normalize_card,
              raw_data_path,
              upsert_cards,
          )

          path = raw_data_path()
          if not path.exists():
              path = download_oracle_cards()
          raw_cards = load_oracle_cards(path)
          rows = [card for item in raw_cards if (card := normalize_card(item)) is not None]
          print(f"upserted_cards={upsert_cards(rows)}")
          PY
          uv run deckbuilder ingest corpus data/raw/atraxa_corpus.csv
          uv run deckbuilder surrogate fit "Atraxa, Praetors' Voice"

      - name: Forge smoke test
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        run: uv run deckbuilder forge smoke-test

      - name: Run calibration shard
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        env:
          SHARD: ${{ matrix.shard }}
          DECKS_PER_SHARD: ${{ inputs.decks_per_shard }}
          MATCHES: ${{ inputs.matches }}
          ATTEMPT_CAP: ${{ inputs.attempt_cap }}
          SAMPLING_MODE: ${{ inputs.sampling_mode }}
          CANDIDATE_POOL_SIZE: ${{ inputs.candidate_pool_size }}
          BAND_COUNT: ${{ inputs.band_count }}
          FORGE_CALIBRATOR: ${{ inputs.forge_calibrator }}
          FORGE_OUTCOME_MODEL: ${{ inputs.forge_outcome_model }}
          RERANK_SHORTLIST_SIZE: ${{ inputs.rerank_shortlist_size }}
          RERANK_MATCHES: ${{ inputs.rerank_matches }}
          RERANK_PRIOR_WEIGHT: ${{ inputs.rerank_prior_weight }}
        run: |
          seed_start=$((42 + SHARD * 10000))
          mkdir -p data/reports
          if [ "$SAMPLING_MODE" = "score-bands" ]; then
            selection_model_args=()
            if [ -n "$FORGE_OUTCOME_MODEL" ]; then
              selection_model_args=(--forge-outcome-model "$FORGE_OUTCOME_MODEL")
            fi
            if [ -n "$FORGE_CALIBRATOR" ]; then
              selection_model_args=(--forge-calibrator "$FORGE_CALIBRATOR" "${selection_model_args[@]}")
            fi
            uv run deckbuilder experiment run-score-bands \
              --commander "Atraxa, Praetors' Voice" \
              --n-decks "$DECKS_PER_SHARD" \
              --matches "$MATCHES" \
              --opponent alela.dck \
              --seed-start "$seed_start" \
              --candidate-pool-size "$CANDIDATE_POOL_SIZE" \
              --band-count "$BAND_COUNT" \
              --rerank-shortlist-size "$RERANK_SHORTLIST_SIZE" \
              --rerank-matches "$RERANK_MATCHES" \
              --rerank-prior-weight "$RERANK_PRIOR_WEIGHT" \
              --output "data/reports/v0_5_calibration_shard_${SHARD}.md" \
              "${selection_model_args[@]}"
          elif [ "$SAMPLING_MODE" = "elite" ]; then
            uv run deckbuilder experiment run \
              --commander "Atraxa, Praetors' Voice" \
              --n-decks "$DECKS_PER_SHARD" \
              --matches "$MATCHES" \
              --opponent alela.dck \
              --seed-start "$seed_start" \
              --attempt-cap "$ATTEMPT_CAP" \
              --output "data/reports/v0_5_calibration_shard_${SHARD}.md"
          else
            echo "Unsupported sampling_mode=$SAMPLING_MODE" >&2
            exit 1
          fi

      - name: Upload shard report
        if: ${{ matrix.shard < fromJSON(inputs.shards) }}
        uses: actions/upload-artifact@v4
        with:
          name: calibration-shard-${{ matrix.shard }}
          path: data/reports/v0_5_calibration_shard_${{ matrix.shard }}.*
